name: scan-matrix

on:
  workflow_dispatch:
  push:
    branches: ["matrix/**"]
  schedule:
    - cron: "0 8 * * 1" # weekly

permissions:
  contents: read

concurrency:
  group: scan-matrix-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GEMINI_MODEL: gemini-2.5-flash-lite

jobs:
  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-latest,  goos: linux,   goarch: amd64, ext: "" }
          - { runner: macos-latest,   goos: darwin,  goarch: arm64, ext: "" }
          - { runner: windows-latest, goos: windows, goarch: amd64, ext: ".exe" }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with: { go-version-file: go.mod }
      - shell: bash
        run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o sandbox-probe${{ matrix.ext }} .
      - uses: actions/upload-artifact@v7
        with:
          name: sandbox-probe-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sandbox-probe${{ matrix.ext }}

  # One row per harness × OS. `family` drives setup, `harness` is the unique label. To add a
  # harness (nono, docker, bwrap, another agent): add rows below, a setup step and a run step
  # gated on its family, and — if it confines the probe — set `sandbox: "on"` so it is asserted.
  scan:
    name: ${{ matrix.harness }} (${{ matrix.os }})
    needs: build
    # Only gemini rows run in the (secret-scoped) gemini environment; others use none.
    environment: ${{ matrix.family == 'gemini' && 'gemini' || '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # direct — unconfined baseline on the runner.
          - { os: linux,   runner: ubuntu-latest,  arch: linux-amd64,   ext: "",     family: direct, harness: direct }
          - { os: macos,   runner: macos-latest,   arch: darwin-arm64,  ext: "",     family: direct, harness: direct }
          - { os: windows, runner: windows-latest, arch: windows-amd64, ext: ".exe", family: direct, harness: direct }
          # claude — real binary, model stubbed (no LLM/key); as-is vs its own sandbox.
          # `expect` (JSON array) is the set of sandbox_detection values that prove confinement.
          - { os: linux, runner: ubuntu-latest, arch: linux-amd64,  ext: "", family: claude, harness: claude,         sandbox: "off" }
          - { os: linux, runner: ubuntu-latest, arch: linux-amd64,  ext: "", family: claude, harness: claude-sandbox, sandbox: "on", expect: '["bubblewrap","no-new-privs","seccomp-filter","landlock"]' }
          - { os: macos, runner: macos-latest,  arch: darwin-arm64, ext: "", family: claude, harness: claude,         sandbox: "off" }
          - { os: macos, runner: macos-latest,  arch: darwin-arm64, ext: "", family: claude, harness: claude-sandbox, sandbox: "on", expect: '["seatbelt"]' }
          # gemini — real agent in its own sandbox; gated on GEMINI_API_KEY + dispatch/schedule.
          - { os: linux, runner: ubuntu-latest, arch: linux-amd64,  ext: "", family: gemini, harness: gemini-docker,       backend: docker }
          - { os: linux, runner: ubuntu-latest, arch: linux-amd64,  ext: "", family: gemini, harness: gemini-podman,       backend: podman }
          - { os: macos, runner: macos-latest,  arch: darwin-arm64, ext: "", family: gemini, harness: gemini-sandbox-exec, backend: sandbox-exec }
    runs-on: ${{ matrix.runner }}
    env:
      RUN_GEMINI: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && secrets.GEMINI_API_KEY != '' }}
      PROBE: ./sandbox-probe${{ matrix.ext }}
      REPORT: reports/${{ matrix.os }}-${{ matrix.harness }}.json
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: sandbox-probe-${{ matrix.arch }}
      - if: runner.os != 'Windows'
        run: chmod +x $PROBE
      - run: mkdir -p reports
        shell: bash

      # ── gemini setup (family=gemini, only when enabled) ────────────────────────
      - if: matrix.backend == 'podman' && env.RUN_GEMINI == 'true'
        run: sudo apt-get update && sudo apt-get install -y podman
      - if: matrix.backend == 'docker' && env.RUN_GEMINI == 'true'
        run: docker info
      - if: matrix.family == 'gemini' && env.RUN_GEMINI == 'true'
        uses: actions/setup-node@v6
        with: { node-version: "22" }
      - if: matrix.family == 'gemini' && env.RUN_GEMINI == 'true'
        run: npm install -g @google/gemini-cli && gemini --version
        shell: bash

      # ── claude setup (family=claude) ───────────────────────────────────────────
      - if: matrix.family == 'claude'
        uses: actions/setup-node@v6
        with: { node-version: "22" }
      - if: matrix.family == 'claude' && runner.os == 'Linux'
        name: claude sandbox deps (linux)
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y bubblewrap socat
          # Ubuntu 24.04+ blocks unprivileged user namespaces by default; bwrap needs them.
          if [ "$(sysctl -n kernel.apparmor_restrict_unprivileged_userns 2>/dev/null || echo 0)" = "1" ]; then
            sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          fi
      - if: matrix.family == 'claude'
        run: npm install -g @anthropic-ai/claude-code && claude --version
        shell: bash

      # ── run the probe under the harness ────────────────────────────────────────
      - if: matrix.family == 'direct'
        name: probe (direct)
        shell: bash
        run: $PROBE scan --tasksets baseline --tags "os=${{ matrix.os }},harness=direct" --output_path "$REPORT"

      - if: matrix.family == 'claude'
        name: probe (${{ matrix.harness }})
        shell: bash
        env:
          OUT: ${{ env.REPORT }}
          RUNNER: ${{ matrix.runner }}
          CLAUDE_SANDBOX: ${{ matrix.sandbox }}
        run: ./scripts/run-probe-via-claude-stub.sh

      - if: matrix.family == 'gemini' && env.RUN_GEMINI == 'true'
        name: probe (${{ matrix.harness }})
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_SANDBOX: ${{ matrix.backend }}
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          SANDBOX_FLAGS: '--entrypoint ""' # gemini-cli#26964 workaround
          LABEL: ${{ matrix.harness }}
          RUNNER: ${{ matrix.runner }}
          BACKEND: ${{ matrix.backend }}
          OUT: ${{ env.REPORT }}
          MODEL: ${{ env.GEMINI_MODEL }}
        run: ./scripts/run-probe-via-gemini.sh

      # ── assert confinement engaged (any row that declares `expect`) ────────────
      # Linux can't always fingerprint a bubblewrap wrapper, so claude-sandbox there accepts the
      # kernel enforcement it adds (no-new-privs / seccomp-filter) — absent from the baseline.
      - if: matrix.expect != ''
        name: assert sandbox engaged
        shell: bash
        env:
          EXPECT: ${{ matrix.expect }}
        run: |
          echo "sandbox_detection accepted in $EXPECT for $REPORT"
          jq --argjson ok "$EXPECT" -e 'any(.findings[];
            .findingType == "sandbox_detection"
            and .task == "baseline_sandbox_detector"
            and (.value as $v | $ok | index($v)))' "$REPORT"

      - name: summary
        if: always()
        shell: bash
        run: |
          {
            echo "### ${{ matrix.harness }} (${{ matrix.os }})"
            echo "- report: \`${{ env.REPORT }}\`"
            echo "- sandbox: \`${{ matrix.sandbox || 'n/a' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: report-${{ matrix.os }}-${{ matrix.harness }}
          path: reports/
          if-no-files-found: ignore
